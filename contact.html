<main>
<section>
    <h2>Laisser nous un FeedBack</h2>
    <form>
        <p>
            <label for="pseudo" >Nom</label>
            <input type="text" id="pseudo" name="pseudo"
                placeholder="Ex. Fatou" required >
        </p>
        <p>
            <label for="email" >mail</label>
            <input type="email" id="email" placeholder="onepiece1@gmail.com" required>
        </p>
        <p>
            <label for="mode">Sujets</label>
            <select name="mode" id="mode" required>
                <option value="">---choisir---</option>
                <option value="Bugs">Bugs</option>
                <option value="suggestion">Suggestions</option>
                <option value="Questions">Questions</option>
            </select>
        </p>
        <p>
            <label for="txt" >Message </label>
            <textarea name="textarea" id="txt" required></textarea>
        </p>
        <p>
            <button type="submit">Envoyer</button>
        </p>
    </form>
</section>
